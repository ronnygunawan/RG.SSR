name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore RG.SSR.Tests/RG.SSR.Tests.csproj

      - name: Build
        run: dotnet build RG.SSR.Tests/RG.SSR.Tests.csproj --no-restore

      - name: Test
        run: dotnet test RG.SSR.Tests/RG.SSR.Tests.csproj --no-build --verbosity normal
